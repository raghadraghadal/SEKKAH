<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEKKAH — Train Monitoring</title>
<link href="https://fonts.googleapis.com/css2?family=Abhaya+Libre:wght@500;800&family=Cairo:wght@700&family=Playfair+Display:wght@900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
/* ── MONITORING SPECIFIC ── */
.mon-header {
  background: linear-gradient(135deg, #0d6b65 0%, #12958D 60%, #1a9d95 100%);
  padding: 32px 36px 28px;
  position: relative; overflow: hidden;
}
.mon-header::before { content:''; position:absolute; top:-50px; right:-50px; width:200px; height:200px; border-radius:50%; background:rgba(255,255,255,0.05); }
.mon-header::after  { content:''; position:absolute; bottom:-30px; left:20%; width:150px; height:150px; border-radius:50%; background:rgba(255,255,255,0.04); }
.mon-title { font-family:'Playfair Display',serif; font-size:32px; font-weight:900; color:white; margin-bottom:6px; position:relative; z-index:2; }
.mon-sub   { font-size:13px; color:rgba(255,255,255,.6); font-weight:500; position:relative; z-index:2; }

/* legend */
.legend { display:flex; gap:18px; margin-bottom:24px; flex-wrap:wrap; }
.legend-item { display:flex; align-items:center; gap:8px; font-size:13px; font-weight:800; color:#555; }
.ldot { width:12px; height:12px; border-radius:50%; }
.l-on  { background:#22c55e; box-shadow:0 0 6px #22c55e; }
.l-late{ background:#ef4444; box-shadow:0 0 6px #ef4444; }
.l-stop{ background:#f59e0b; box-shadow:0 0 6px #f59e0b; }

/* train cards grid */
.trains-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:20px; margin-bottom:28px; }

.train-card {
  background:white; border-radius:20px;
  overflow:hidden; cursor:pointer;
  box-shadow:0 3px 14px rgba(0,0,0,0.07);
  border:2px solid transparent;
  transition:transform .28s cubic-bezier(0.34,1.56,0.64,1), box-shadow .25s, border-color .2s;
  position:relative;
}
.train-card:hover { transform:translateY(-6px) scale(1.02); box-shadow:0 14px 36px rgba(18,149,141,0.18); }

/* coloured top strip */
.tc-strip { height:5px; width:100%; }
.tc-on   .tc-strip { background:linear-gradient(90deg,#0a6641,#22c55e); }
.tc-late .tc-strip { background:linear-gradient(90deg,#991b1b,#ef4444); }
.tc-stop .tc-strip { background:linear-gradient(90deg,#92400e,#f59e0b); }
.tc-on:hover   { border-color:#22c55e; }
.tc-late:hover { border-color:#ef4444; }
.tc-stop:hover { border-color:#f59e0b; }

.tc-body { padding:20px; }
.tc-top  { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }

.tc-icon {
  width:48px; height:48px; border-radius:14px;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0;
  transition:transform .3s cubic-bezier(0.34,1.56,0.64,1);
}
.train-card:hover .tc-icon { transform:scale(1.18) rotate(-8deg); }
.tc-on   .tc-icon { background:#d4f5e9; } .tc-on   .tc-icon i { color:#0a6641; }
.tc-late .tc-icon { background:#fde8e8; } .tc-late .tc-icon i { color:#991b1b; }
.tc-stop .tc-icon { background:#fef3c7; } .tc-stop .tc-icon i { color:#92400e; }
.tc-icon i { font-size:24px; }

.tc-status-badge {
  display:flex; align-items:center; gap:6px;
  font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:1px;
  padding:4px 10px; border-radius:20px;
}
.tc-on   .tc-status-badge { background:#d4f5e9; color:#0a6641; }
.tc-late .tc-status-badge { background:#fde8e8; color:#991b1b; }
.tc-stop .tc-status-badge { background:#fef3c7; color:#92400e; }
.sb-dot { width:7px; height:7px; border-radius:50%; }
.tc-on   .sb-dot { background:#22c55e; animation:blink 1.5s infinite; }
.tc-late .sb-dot { background:#ef4444; animation:blink 1s infinite; }
.tc-stop .sb-dot { background:#f59e0b; }
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

.tc-name { font-size:18px; font-weight:900; color:#1a1a1a; margin-bottom:4px; }
.tc-route { font-size:12px; color:#888; font-weight:500; margin-bottom:12px; }

.tc-info { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.tc-info-item label { font-size:10px; color:#aaa; text-transform:uppercase; letter-spacing:.5px; display:block; margin-bottom:2px; }
.tc-info-item span  { font-size:13px; font-weight:900; color:#333; }

.tc-footer {
  display:flex; align-items:center; justify-content:space-between;
  margin-top:14px; padding-top:12px; border-top:1px solid #f5f5f5;
}
.tc-prev { font-size:11px; color:#aaa; font-weight:500; }
.tc-arrow {
  width:28px; height:28px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  transition:transform .2s, background .2s;
}
.tc-on   .tc-arrow { background:#d4f5e9; } .tc-on   .tc-arrow i { color:#0a6641; }
.tc-late .tc-arrow { background:#fde8e8; } .tc-late .tc-arrow i { color:#991b1b; }
.tc-stop .tc-arrow { background:#fef3c7; } .tc-stop .tc-arrow i { color:#92400e; }
.train-card:hover .tc-arrow { transform:translateX(3px); }
.tc-arrow i { font-size:15px; }

/* detail panel */
.detail-panel {
  display:none; background:white; border-radius:20px;
  padding:28px 32px; margin-bottom:20px;
  box-shadow:0 3px 14px rgba(0,0,0,0.07);
  border-left:4px solid #12958D;
  animation:slideDown .3s ease;
}
@keyframes slideDown { from{opacity:0;transform:translateY(-10px)} to{opacity:1;transform:translateY(0)} }
.detail-panel.open { display:block; }
.dp-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
.dp-title  { font-size:20px; font-weight:900; color:#1a1a1a; }
.dp-close  {
  display:flex; align-items:center; gap:5px;
  padding:6px 14px; border-radius:25px;
  background:#f5f5f5; border:none; font-size:13px;
  font-weight:800; font-family:'Abhaya Libre',serif; cursor:pointer;
  transition:background .2s;
}
.dp-close:hover { background:#EAF6F5; color:#12958D; }
.dp-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; }
.dp-item { background:#f8fffe; border-radius:12px; padding:14px 16px; }
.dp-item label { font-size:10px; color:#aaa; text-transform:uppercase; letter-spacing:.5px; display:block; margin-bottom:5px; }
.dp-item .val   { font-size:16px; font-weight:900; color:#1a1a1a; }

.back-btn { display:inline-flex; align-items:center; gap:8px; padding:10px 22px; border-radius:25px; background:white; color:#555; border:1.5px solid #e5e7eb; font-size:14px; font-weight:800; font-family:'Abhaya Libre',serif; cursor:pointer; text-decoration:none; transition:background .2s; }
.back-btn:hover { background:#EAF6F5; color:#12958D; }

@media(max-width:900px){ .trains-grid{grid-template-columns:1fr 1fr;} .dp-grid{grid-template-columns:1fr 1fr;} }
@media(max-width:600px){ .trains-grid{grid-template-columns:1fr;} }
</style>
</head>
<body>

<nav class="top-navbar">
  <a href="home.html" class="nb-brand"><div class="nb-icon">سِ</div><div class="nb-name">SEKKAH</div></a>
  <div class="nb-links">
    <a href="home.html" class="nb-link"><i class="material-icons">home</i><span>Home</span></a>
    <a href="Train management menu .html" class="nb-link active"><i class="material-icons">train</i><span>Train Management</span></a>
    <a href="Passenger Management.html" class="nb-link"><i class="material-icons">groups</i><span>Passengers</span></a>
    <a href="Reservation system .html" class="nb-link"><i class="material-icons">confirmation_number</i><span>Reservations</span></a>
    <a href="Dashboard.html" class="nb-link"><i class="material-icons">bar_chart</i><span>Dashboard</span></a>
  </div>
  <div class="nb-right">
    <a href="Profile.html" class="nb-user"><i class="material-icons">person_outline</i><span id="nbUser">Admin</span></a>
    <a href="StartHer.html" class="nb-logout"><i class="material-icons">logout</i>Logout</a>
  </div>
</nav>

<!-- Hero header -->
<div class="mon-header">
  <div class="mon-title">Train Monitoring</div>
  <div class="mon-sub">Live status of all active trains across the Saudi rail network</div>
</div>

<div class="page-body">

  <!-- Legend -->
  <div class="legend">
    <div class="legend-item"><span class="ldot l-on"></span>On Time</div>
    <div class="legend-item"><span class="ldot l-late"></span>Late</div>
    <div class="legend-item"><span class="ldot l-stop"></span>Stopped</div>
  </div>

  <!-- Detail panel -->
  <div class="detail-panel" id="detailPanel">
    <div class="dp-header">
      <div class="dp-title" id="dpTitle">Train Details</div>
      <button class="dp-close" onclick="closeDetail()"><i class="material-icons" style="font-size:16px">close</i>Close</button>
    </div>
    <div class="dp-grid" id="dpGrid"></div>
  </div>

  <!-- Trains grid -->
  <div class="trains-grid" id="trainsGrid"></div>

  <a href="Train management menu .html" class="back-btn">
    <i class="material-icons" style="font-size:18px">arrow_back</i> Back to Train Management
  </a>
</div>

<script>
if(!localStorage.getItem('userName')){alert('Please login first!');location.href='Login.html';}
document.getElementById('nbUser').textContent = localStorage.getItem('userName')||'Admin';

const trains = [
  { id:1, name:'Train 101', route:'Riyadh → Dammam', prev:'Dammam → Riyadh', dep:'5:00 PM', arr:'7:00 PM', seats:50, status:'Late',    cls:'tc-late' },
  { id:2, name:'Train 102', route:'Abha → Tabuk',    prev:'Tabuk → Abha',    dep:'12:00 PM',arr:'4:00 PM', seats:35, status:'On Time', cls:'tc-on'   },
  { id:3, name:'Train 103', route:'Hail → Madinah',  prev:'Madinah → Hail',  dep:'8:00 AM', arr:'11:00 AM',seats:22, status:'Stopped', cls:'tc-stop' },
];

function statusIcon(status){
  if(status==='On Time') return 'check_circle';
  if(status==='Late')    return 'schedule';
  return 'pause_circle';
}

function renderCards(){
  const grid = document.getElementById('trainsGrid');
  grid.innerHTML = trains.map(t => `
    <div class="train-card ${t.cls}" onclick="showDetail(${t.id})">
      <div class="tc-strip"></div>
      <div class="tc-body">
        <div class="tc-top">
          <div class="tc-icon"><i class="material-icons">${statusIcon(t.status)}</i></div>
          <div class="tc-status-badge"><span class="sb-dot"></span>${t.status}</div>
        </div>
        <div class="tc-name">${t.name}</div>
        <div class="tc-route">📍 ${t.route}</div>
        <div class="tc-info">
          <div class="tc-info-item"><label>Departure</label><span>${t.dep}</span></div>
          <div class="tc-info-item"><label>Arrival</label><span>${t.arr}</span></div>
          <div class="tc-info-item"><label>Seats</label><span>${t.seats}</span></div>
          <div class="tc-info-item"><label>Status</label><span>${t.status}</span></div>
        </div>
        <div class="tc-footer">
          <div class="tc-prev">← Prev: ${t.prev}</div>
          <div class="tc-arrow"><i class="material-icons">arrow_forward</i></div>
        </div>
      </div>
    </div>
  `).join('');
}

function showDetail(id){
  const t = trains.find(x=>x.id===id);
  document.getElementById('dpTitle').textContent = t.name + ' — Full Details';
  document.getElementById('dpGrid').innerHTML = [
    {lbl:'Train Name',    val:t.name},
    {lbl:'Current Route', val:t.route},
    {lbl:'Previous Route',val:t.prev},
    {lbl:'Status',        val:t.status},
    {lbl:'Departure',     val:t.dep},
    {lbl:'Arrival',       val:t.arr},
    {lbl:'Total Seats',   val:t.seats},
    {lbl:'Network',       val:'Saudi Rail'},
  ].map(i=>`
    <div class="dp-item">
      <label>${i.lbl}</label>
      <div class="val">${i.val}</div>
    </div>
  `).join('');
  const panel = document.getElementById('detailPanel');
  panel.classList.add('open');
  panel.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function closeDetail(){
  document.getElementById('detailPanel').classList.remove('open');
}

renderCards();
</script>
</body>
</html>
