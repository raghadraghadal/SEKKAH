<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Train Monitoring</title>
    <link href="https://fonts.googleapis.com/css2?family=Abhaya+Libre:wght@500;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        * { box-sizing: border-box; font-family: 'Abhaya Libre', serif; }
        body { margin: 0; display: flex; min-height: 100vh; background-color: #EAF6F5; position: relative; padding: 20px; overflow-x: hidden; }

        #menu-toggle { display: none; }
        .header-logo { position: absolute; top: 10px; right: 30px; width: 90px; height: auto; z-index: 1000; }
        .sidebar-small { width: 50px; background: white; border-radius: 20px; display: flex; flex-direction: column; align-items: center; padding: 15px 0; box-shadow: 2px 0 10px rgba(0,0,0,0.03); height: 85vh; position: fixed; left: 10px; top: 7.5vh; z-index: 1000; }
        .menu-btn-label { font-size: 28px; cursor: pointer; color: #333; }
        .sidebar-overlay { position: fixed; left: -320px; width: 280px; background: white; z-index: 1100; transition: 0.3s ease-in-out; box-shadow: 5px 0 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; padding: 20px; height: 85vh; top: 7.5vh; border-radius: 25px; }
        #menu-toggle:checked ~ .sidebar-overlay { left: 0; }
        .overlay-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); z-index: 90; display: none; }
        #menu-toggle:checked ~ .overlay-bg { display: block; }
        .nav-item { display: flex; align-items: center; gap: 15px; padding: 15px; cursor: pointer; border-radius: 10px; margin-bottom: 10px; color: black; text-decoration: none; }
        .nav-item.main-link { font-size: 18px; font-weight: 900; }
        .nav-item:hover { background: #f5f5f5; }
        .nav-item.active { background: #f0f8f7; border-radius: 15px; }
        .logout-btn { margin-top: auto; background: #E53935; color: white; border-radius: 20px; padding: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; text-decoration: none; }
        .main-wrapper { flex: 1; margin-left: 80px; display: flex; flex-direction: column; align-items: center; position: relative; width: calc(100% - 80px); }
        .content-area { background: white; border-radius: 50px; margin-top: 100px; padding: 60px 50px; width: 85%; max-width: 1100px; box-shadow: 0 4px 20px rgba(0,0,0,0.02); display: flex; flex-direction: column; align-items: flex-start; height: fit-content; margin-bottom: 40px; }

        h1 { font-size: 45px; font-weight: 300; color: #1a1a1a; margin-bottom: 40px; letter-spacing: 2px; }

        .legend { display: flex; gap: 20px; margin-bottom: 28px; flex-wrap: wrap; }
        .legend-item { display: flex; align-items: center; gap: 8px; font-size: 13px; font-weight: 800; color: #6b7280; }
        .status-dot { width: 14px; height: 14px; border-radius: 50%; display: inline-block; }
        .dot-ontime { background: #22c55e; box-shadow: 0 0 8px #22c55e; }
        .dot-late    { background: #ef4444; box-shadow: 0 0 8px #ef4444; }
        .dot-stopped { background: #f59e0b; box-shadow: 0 0 8px #f59e0b; }

        .trains-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px,1fr)); gap: 20px; width: 100%; }
        .mon-card { cursor: pointer; background: linear-gradient(135deg,#12958D,#0d7069); border-radius: 16px; padding: 24px; color: #fff; position: relative; overflow: hidden; transition: transform .2s; }
        .mon-card:hover { transform: translateY(-3px); }
        .mon-card::before { content:''; position:absolute; right:-20px; top:-20px; width:110px; height:110px; border-radius:50%; background:rgba(255,255,255,.07); }

        .detail-panel { display:none; background:#EAF6F5; border-radius:16px; padding:24px; margin-top:20px; border:1.5px solid #c4e9e7; width:100%; }
        .detail-panel.open { display:block; }
        .detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-top:16px; }
        .detail-item label { font-size:11px; text-transform:uppercase; letter-spacing:.5px; color:#6b7280; font-weight:800; }
        .detail-item p { font-size:16px; font-weight:800; color:#1a1a1a; margin-top:4px; }

        .btn-back { display:inline-flex; align-items:center; gap:8px; margin-top:28px; padding:11px 26px; border-radius:50px; background:transparent; color:#6b7280; border:1.5px solid #e5e7eb; font-family:'Abhaya Libre',serif; font-size:15px; font-weight:800; cursor:pointer; text-decoration:none; }
        .btn-back:hover { background:#e5e7eb; }
        .btn-close { display:inline-flex; align-items:center; gap:6px; padding:6px 16px; border-radius:50px; background:transparent; color:#6b7280; border:1.5px solid #e5e7eb; font-family:'Abhaya Libre',serif; font-size:13px; font-weight:800; cursor:pointer; }
    </style>
</head>
<body>
    <input type="checkbox" id="menu-toggle" style="display:none;">
    <label for="menu-toggle" class="overlay-bg"></label>
    <div class="sidebar-small">
        <label for="menu-toggle" class="material-icons menu-btn-label">menu</label>
    </div>
    <div class="sidebar-overlay">
        <label for="menu-toggle" class="material-icons" style="align-self:flex-end;cursor:pointer;font-size:30px;margin-bottom:40px;">close</label>
        <a href="home.html" class="nav-item"><i class="material-icons">home</i><span>Home</span></a>
        <a href="train-management- menu.html" class="nav-item active"><i class="material-icons">train</i><span>Train Management</span></a>
        <a href="Passenger Management.html" class="nav-item"><i class="material-icons">groups</i><span>Passenger Management</span></a>
        <a href="Reservation-System.html" class="nav-item"><i class="material-icons">confirmation_number</i><span>Reservation System</span></a>
        <a href="Dashboard.html" class="nav-item"><i class="material-icons">bar_chart</i><span>Dashboard &amp; Reports</span></a>
        <a href="profile.html" class="nav-item main-link" style="margin-top:15px;"><i class="material-icons">person_outline</i><span>Account Details</span></a>
        <a href="StartHer.html" class="logout-btn"><i class="material-icons">logout</i><span>Logout</span></a>
    </div>
    <div class="main-wrapper">
        <img src="images/Logo.svg" alt="Sikka Logo" class="header-logo">
        <div class="content-area">
            <h1>Train Monitoring</h1>
            <div class="legend">
                <div class="legend-item"><span class="status-dot dot-ontime"></span>On Time</div>
                <div class="legend-item"><span class="status-dot dot-late"></span>Late</div>
                <div class="legend-item"><span class="status-dot dot-stopped"></span>Stopped</div>
            </div>
            <div class="trains-grid" id="trainsGrid"></div>
            <div class="detail-panel" id="detailPanel">
                <div style="display:flex;justify-content:space-between;align-items:center;">
                    <h3 id="detailTitle" style="font-size:20px;font-weight:800;"></h3>
                    <button class="btn-close" onclick="closeDetail()">Close</button>
                </div>
                <div class="detail-grid" id="detailGrid"></div>
            </div>
            <a href="train-management- menu.html" class="btn-back"><i class="material-icons" style="font-size:18px">arrow_back</i>Back</a>
        </div>
    </div>
<script>
if(!localStorage.getItem("userName")){alert("Please login first!");window.location.href="Login.html";}
const trains=[{name:"Train 101",current:"Riyadh → Dammam",prev:"Dammam → Riyadh",dep:"5:00 PM",arr:"7:00 PM",status:"Late",dot:"dot-late"},{name:"Train 102",current:"Abha → Tabuk",prev:"Tabuk → Abha",dep:"12:00 PM",arr:"4:00 PM",status:"On Time",dot:"dot-ontime"},{name:"Train 103",current:"Hail → Madinah",prev:"Madinah → Hail",dep:"8:00 AM",arr:"11:00 AM",status:"Stopped",dot:"dot-stopped"}];
const grid=document.getElementById("trainsGrid");
trains.forEach((t,i)=>{const c=document.createElement("div");c.className="mon-card";c.innerHTML=`<div style="font-size:20px;font-weight:800;margin-bottom:8px;">${t.name}</div><div style="font-size:13px;opacity:.85;margin-bottom:4px;">Current: ${t.current}</div><div style="font-size:12px;opacity:.7;">Previous: ${t.prev}</div><div style="position:absolute;bottom:16px;right:20px;display:flex;align-items:center;gap:6px;font-size:13px;font-weight:800;"><span class="status-dot ${t.dot}"></span>${t.status}</div>`;c.onclick=()=>showDetail(i);grid.appendChild(c);});
function showDetail(i){const t=trains[i];document.getElementById("detailTitle").textContent=t.name+" — Details";document.getElementById("detailGrid").innerHTML=`<div class="detail-item"><label>Current Trip</label><p>${t.current}</p></div><div class="detail-item"><label>Previous Trip</label><p>${t.prev}</p></div><div class="detail-item"><label>Departure</label><p>${t.dep}</p></div><div class="detail-item"><label>Arrival</label><p>${t.arr}</p></div><div class="detail-item"><label>Status</label><p><span class="status-dot ${t.dot}" style="vertical-align:middle"></span>${t.status}</p></div>`;document.getElementById("detailPanel").classList.add("open");document.getElementById("detailPanel").scrollIntoView({behavior:"smooth",block:"nearest"});}
function closeDetail(){document.getElementById("detailPanel").classList.remove("open");}
</script>
</body>
</html>
