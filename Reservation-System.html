<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservation System</title>

    <link href="https://fonts.googleapis.com/css2?family=Abhaya+Libre:wght@500;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">

    <style>
        * { box-sizing: border-box; font-family: 'Abhaya Libre', serif; font-weight: 800; font-size: 14px; }

        body {
            margin: 0;
            display: flex;
            min-height: 100vh;
            background-color: #EAF6F5;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 20px;
            overflow-x: hidden;
        }

        #menu-toggle { display: none; }

        .header-logo { position: absolute; top: 20px; right: 40px; width: 100px; z-index: 1; }

        .main-wrapper { display: flex; gap: 20px; width: 100%; max-width: 1200px; align-items: stretch; }

        .sidebar-small {
            width: 65px; background: white; border-radius: 30px;
            display: flex; flex-direction: column; align-items: center;
            padding: 30px 0; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .menu-btn-label { font-size: 32px; cursor: pointer; color: #333; }

        .sidebar-overlay {
            position: fixed; top: 0; left: -300px; width: 280px; height: 100%;
            background: white; z-index: 100; transition: 0.3s ease-in-out;
            box-shadow: 5px 0 15px rgba(0,0,0,0.1);
            display: flex; flex-direction: column; padding: 20px;
        }

        #menu-toggle:checked ~ .sidebar-overlay { left: 0; }

        .overlay-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.3); z-index: 90; display: none;
        }

        #menu-toggle:checked ~ .overlay-bg { display: block; }

        .nav-item {
            display: flex; align-items: center; gap: 15px; padding: 15px;
            cursor: pointer; border-radius: 10px; margin-bottom: 5px;
            color: black; text-decoration: none;
        }
        .nav-item.main-link { font-size: 20px; font-weight: 900; }
        .nav-item:hover { background: #f5f5f5; }
        .nav-item.active { background: #f0f8f7; }

        .logout-btn {
            margin-top: auto; background: #E53935; color: white;
            border-radius: 20px; padding: 12px;
            display: flex; align-items: center; justify-content: center;
            gap: 10px; text-decoration: none;
        }

        /* ── CONTENT ── */
        .content-area {
            flex: 1; background: white; border-radius: 30px;
            padding: 40px 50px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            min-height: 600px; position: relative;
        }

        .page-title { font-size: 45px; font-weight: 500; margin: 10px 0 30px; color: #1a1a1a; letter-spacing: 1px; }

        /* search bar */
        .search-row {
            display: flex; gap: 15px; margin-bottom: 25px; align-items: center; flex-wrap: wrap;
        }

        .search-input {
            flex: 1; min-width: 200px; padding: 12px 20px;
            border: 1.5px solid #e0e0e0; border-radius: 30px;
            font-size: 15px; outline: none; font-family: 'Abhaya Libre', serif;
            transition: border-color 0.3s;
        }
        .search-input:focus { border-color: #12958D; }

        .btn-add {
            background: #12958D; color: white; border: none;
            border-radius: 30px; padding: 12px 28px;
            font-size: 16px; font-weight: 800; cursor: pointer;
            display: flex; align-items: center; gap: 8px;
            font-family: 'Abhaya Libre', serif; transition: 0.2s;
        }
        .btn-add:hover { background: #0e7a73; }

        /* table */
        .res-table {
            width: 100%; border-collapse: collapse;
            background: #F0F8F7; border-radius: 20px; overflow: hidden;
        }

        .res-table thead th {
            background: #12958D; color: white;
            padding: 16px 12px; font-size: 14px; font-weight: 600; text-align: center;
        }

        .res-table tbody td {
            padding: 18px 10px; text-align: center;
            border-right: 1.5px solid rgba(18,149,141,0.15);
            font-size: 15px; color: #333;
        }
        .res-table tbody td:last-child { border-right: none; }
        .res-table tbody tr:nth-child(even) { background: rgba(18,149,141,0.04); }

        .status-badge {
            padding: 5px 14px; border-radius: 20px;
            font-size: 13px; font-weight: 800; display: inline-block;
        }
        .status-confirmed { background: #d4f5e9; color: #0a6641; }
        .status-pending   { background: #fff3cd; color: #856404; }
        .status-cancelled { background: #fde2e2; color: #8b0000; }

        .btn-cancel {
            background: #F94F4F; color: white; border: none;
            border-radius: 10px; padding: 7px 14px;
            font-size: 13px; font-weight: 800; cursor: pointer;
            font-family: 'Abhaya Libre', serif; transition: 0.2s;
        }
        .btn-cancel:hover { background: #d43b3b; }

        /* modal overlay */
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.4); z-index: 500;
            align-items: center; justify-content: center;
        }
        .modal-overlay.show { display: flex; }

        .modal {
            background: white; border-radius: 30px;
            padding: 40px; width: 480px; max-width: 95vw;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }

        .modal h2 { font-size: 28px; font-weight: 500; margin: 0 0 25px; color: #1a1a1a; }

        .modal-field { margin-bottom: 18px; }
        .modal-field label { display: block; font-size: 14px; color: #555; margin-bottom: 6px; font-weight: 800; }
        .modal-field select,
        .modal-field input {
            width: 100%; padding: 12px 18px;
            border: 1.5px solid #e0e0e0; border-radius: 20px;
            font-size: 15px; outline: none; font-family: 'Abhaya Libre', serif;
            background: #f9f9f9;
        }
        .modal-field select:focus,
        .modal-field input:focus { border-color: #12958D; }

        .modal-actions { display: flex; gap: 15px; margin-top: 25px; justify-content: flex-end; }

        .btn-confirm {
            background: #12958D; color: white; border: none;
            border-radius: 20px; padding: 12px 30px;
            font-size: 16px; font-weight: 800; cursor: pointer;
            font-family: 'Abhaya Libre', serif;
        }
        .btn-cancel-modal {
            background: transparent; color: #333; border: 1.5px solid #ddd;
            border-radius: 20px; padding: 12px 30px;
            font-size: 16px; font-weight: 800; cursor: pointer;
            font-family: 'Abhaya Libre', serif;
        }

        .empty-msg { text-align: center; color: #aaa; padding: 40px; font-size: 18px; }
    </style>
</head>
<body>

<input type="checkbox" id="menu-toggle">
<img src="images/Logo.svg" alt="Sikka Logo" class="header-logo">
<label for="menu-toggle" class="overlay-bg"></label>

<div class="sidebar-overlay">
    <label for="menu-toggle" class="material-icons" style="align-self:flex-end;cursor:pointer;font-size:30px;margin-bottom:40px;">close</label>

    <a href="home.html" class="nav-item main-link"><i class="material-icons">home</i><span>Home</span></a>
    <a href="train-management- menu.html" class="nav-item"><i class="material-icons">train</i><span>Train Management</span></a>
    <a href="Passenger Management.html" class="nav-item"><i class="material-icons">groups</i><span>Passenger Management</span></a>
    <a href="Reservation-System.html" class="nav-item active"><i class="material-icons">confirmation_number</i><span>Reservation System</span></a>
    <a href="Dashboard.html" class="nav-item"><i class="material-icons">bar_chart</i><span>Dashboard & Reports</span></a>
    <a href="profile.html" class="nav-item main-link" style="margin-top:15px;"><i class="material-icons">person_outline</i><span>Account Details</span></a>
    <a href="StartHer.html" class="logout-btn"><i class="material-icons">logout</i><span>Logout</span></a>
</div>

<div class="main-wrapper">
    <div class="sidebar-small">
        <label for="menu-toggle" class="material-icons menu-btn-label">menu</label>
    </div>

    <div class="content-area">
        <h1 class="page-title">Reservation System</h1>

        <div class="search-row">
            <input type="text" class="search-input" id="searchInput" placeholder="Search by passenger name or booking ID...">
            <button class="btn-add" onclick="openModal()">
                <i class="material-icons" style="font-size:20px;">add</i> New Booking
            </button>
        </div>

        <table class="res-table" id="resTable">
            <thead>
                <tr>
                    <th>Booking ID</th>
                    <th>Passenger Name</th>
                    <th>Train</th>
                    <th>Route</th>
                    <th>Seat</th>
                    <th>Date</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="resBody">
                <!-- filled by JS -->
            </tbody>
        </table>
    </div>
</div>

<!-- Add Booking Modal -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <h2>New Booking</h2>

        <div class="modal-field">
            <label>Passenger Name</label>
            <input type="text" id="m_name" placeholder="Enter passenger name">
        </div>
        <div class="modal-field">
            <label>Train</label>
            <select id="m_train">
                <option value="">-- Select Train --</option>
                <option value="Train 101">Train 101 — Riyadh → Dammam</option>
                <option value="Train 102">Train 102 — Abha → Tabuk</option>
                <option value="Train 103">Train 103 — Hail → Madinah</option>
            </select>
        </div>
        <div class="modal-field">
            <label>Seat Number</label>
            <input type="number" id="m_seat" placeholder="e.g. 12" min="1" max="50">
        </div>
        <div class="modal-field">
            <label>Date</label>
            <input type="date" id="m_date">
        </div>

        <div class="modal-actions">
            <button class="btn-cancel-modal" onclick="closeModal()">Cancel</button>
            <button class="btn-confirm" onclick="addBooking()">Confirm Booking</button>
        </div>
    </div>
</div>

<script>
    // ── seed data ──
    const defaultBookings = [
        { id: "BK-001", name: "Anas bin Malik",      train: "Train 101", route: "Riyadh → Dammam", seat: 5,  date: "2026-03-10", status: "Confirmed" },
        { id: "BK-002", name: "Saad bin Ahmad",      train: "Train 102", route: "Abha → Tabuk",    seat: 12, date: "2026-03-11", status: "Pending"   },
        { id: "BK-003", name: "Ibrahim bin Abdullah",train: "Train 103", route: "Hail → Madinah",  seat: 7,  date: "2026-03-12", status: "Confirmed" },
    ];

    const ROUTES = {
        "Train 101": "Riyadh → Dammam",
        "Train 102": "Abha → Tabuk",
        "Train 103": "Hail → Madinah"
    };

    function loadBookings() {
        const saved = localStorage.getItem("bookings");
        return saved ? JSON.parse(saved) : defaultBookings;
    }

    function saveBookings(list) {
        localStorage.setItem("bookings", JSON.stringify(list));
    }

    function statusClass(s) {
        if (s === "Confirmed") return "status-confirmed";
        if (s === "Pending")   return "status-pending";
        return "status-cancelled";
    }

    function renderTable(filter = "") {
        const list = loadBookings();
        const body = document.getElementById("resBody");
        const filtered = filter
            ? list.filter(b => b.name.toLowerCase().includes(filter.toLowerCase()) || b.id.toLowerCase().includes(filter.toLowerCase()))
            : list;

        if (filtered.length === 0) {
            body.innerHTML = `<tr><td colspan="8" class="empty-msg">No bookings found.</td></tr>`;
            return;
        }

        body.innerHTML = filtered.map((b, i) => `
            <tr>
                <td>${b.id}</td>
                <td>${b.name}</td>
                <td>${b.train}</td>
                <td>${b.route}</td>
                <td>${b.seat}</td>
                <td>${b.date}</td>
                <td><span class="status-badge ${statusClass(b.status)}">${b.status}</span></td>
                <td>${b.status !== "Cancelled"
                    ? `<button class="btn-cancel" onclick="cancelBooking('${b.id}')">Cancel</button>`
                    : "—"
                }</td>
            </tr>
        `).join("");
    }

    function cancelBooking(id) {
        if (!confirm("Are you sure you want to cancel this booking?")) return;
        const list = loadBookings();
        const idx = list.findIndex(b => b.id === id);
        if (idx !== -1) { list[idx].status = "Cancelled"; saveBookings(list); renderTable(); }
    }

    function openModal() {
        document.getElementById("modalOverlay").classList.add("show");
        document.getElementById("m_date").value = new Date().toISOString().split("T")[0];
    }

    function closeModal() {
        document.getElementById("modalOverlay").classList.remove("show");
        ["m_name","m_train","m_seat","m_date"].forEach(id => document.getElementById(id).value = "");
    }

    function addBooking() {
        const name  = document.getElementById("m_name").value.trim();
        const train = document.getElementById("m_train").value;
        const seat  = document.getElementById("m_seat").value;
        const date  = document.getElementById("m_date").value;

        if (!name || !train || !seat || !date) {
            alert("Please fill in all fields.");
            return;
        }

        const list = loadBookings();
        const newId = "BK-" + String(list.length + 1).padStart(3, "0");
        list.push({ id: newId, name, train, route: ROUTES[train], seat: parseInt(seat), date, status: "Confirmed" });
        saveBookings(list);
        closeModal();
        renderTable();
        alert("Booking added successfully!");
    }

    document.getElementById("searchInput").addEventListener("input", function() {
        renderTable(this.value);
    });

    // guard
    if (!localStorage.getItem("userName")) {
        alert("Please login first!");
        window.location.href = "Login.html";
    }

    renderTable();
</script>

</body>
</html>
