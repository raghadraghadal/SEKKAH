<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add New Train</title>

    <link href="https://fonts.googleapis.com/css2?family=Abhaya+Libre:wght@500;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">

    <style>
        * {
            box-sizing: border-box;
            font-family: 'Abhaya Libre', serif;
        }

        body {
            margin: 0;
            display: flex;
            min-height: 100vh;
            background-color: #EAF6F5;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 20px;
            overflow-x: hidden;
        }

        #menu-toggle {
            display: none;
        }

        .header-logo {
            position: absolute;
            top: 20px;
            right: 40px;
            width: 100px;
            z-index: 1;
        }

        .main-wrapper {
            display: flex;
            gap: 20px;
            width: 100%;
            max-width: 1200px;
            align-items: stretch;
        }

        .sidebar-small {
            width: 65px;
            background: white;
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 0;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        .menu-btn-label {
            font-size: 32px;
            cursor: pointer;
            color: #333;
        }

        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: -300px;
            width: 280px;
            height: 100%;
            background: white;
            z-index: 100;
            transition: 0.3s ease-in-out;
            box-shadow: 5px 0 15px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        #menu-toggle:checked~.sidebar-overlay {
            left: 0;
        }

        .overlay-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            z-index: 90;
            display: none;
        }

        #menu-toggle:checked~.overlay-bg {
            display: block;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            cursor: pointer;
            border-radius: 10px;
            margin-bottom: 5px;
            color: black;
            text-decoration: none;
            font-size: 16px;
            font-weight: 800;
        }

        .nav-item.main-link {
            font-size: 20px;
            font-weight: 900;
        }

        .nav-item:hover {
            background: #f5f5f5;
        }

        .logout-btn {
            margin-top: auto;
            background: #E53935;
            color: white;
            border-radius: 20px;
            padding: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
        }

        .content-area {
            flex: 1;
            background: white;
            border-radius: 30px;
            padding: 40px 60px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            min-height: 600px;
            position: relative;
        }

        .page-title {
            font-size: 52px;
            font-weight: 500;
            margin: 10px 0 45px 0;
            color: black;
        }

        .train-form {
            max-width: 700px;
        }

        .form-row {
            display: flex;
            align-items: center;
            margin-bottom: 40px;
            gap: 30px;
        }

        .form-row label {
            width: 150px;
            font-size: 28px;
            font-weight: 800;
            color: black;
        }

        .input-box {
            width: 320px;
            height: 52px;
            border: none;
            border-radius: 30px;
            background: #F5F5F5;
            padding: 0 24px;
            font-size: 26px;
            font-weight: 500;
            outline: none;
        }

        .status-buttons {
            display: flex;
            gap: 30px;
        }

        .status-btn {
            width: 155px;
            height: 52px;
            border: none;
            border-radius: 30px;
            font-size: 24px;
            font-weight: 500;
            cursor: pointer;
            opacity: 0.75;
            transition: 0.2s;
        }

        .status-btn.active {
            opacity: 1;
            outline: 3px solid rgba(0, 0, 0, 0.08);
        }

        .available {
            background: rgba(109, 235, 124, 0.96);
            color: black;
        }

        .unavailable {
            background: #F94F4F;
            color: black;
        }

        .form-actions {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 35px;
            margin-top: 110px;
        }

        .add-btn {
            width: 230px;
            height: 78px;
            border: none;
            border-radius: 12px;
            background: #8FC5C3;
            color: white;
            font-size: 30px;
            font-weight: 500;
            cursor: pointer;
        }

        .cancel-btn {
            border: none;
            background: transparent;
            color: #243B72;
            font-size: 30px;
            font-weight: 500;
            cursor: pointer;
        }

        .message {
            margin-top: 25px;
            font-size: 24px;
            font-weight: 800;
        }

        .preview-table {
            margin-top: 30px;
            width: 100%;
            max-width: 700px;
            border-collapse: collapse;
            display: none;
        }

        .preview-table th,
        .preview-table td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: center;
            font-size: 18px;
        }

        .preview-table th {
            background: #8FC5C3;
            color: black;
        }

        @media (max-width: 900px) {
            .main-wrapper {
                flex-direction: column;
            }

            .content-area {
                padding: 30px 20px;
            }

            .page-title {
                font-size: 38px;
            }

            .form-row {
                flex-direction: column;
                align-items: flex-start;
            }

            .form-row label {
                width: auto;
                font-size: 24px;
            }

            .input-box {
                width: 100%;
            }

            .status-buttons {
                flex-wrap: wrap;
            }

            .form-actions {
                justify-content: flex-start;
                flex-wrap: wrap;
            }
        }
    </style>
</head>

<body>
    <input type="checkbox" id="menu-toggle">

    <img src="images/Logo.svg" alt="Sikka Logo" class="header-logo">

    <label for="menu-toggle" class="overlay-bg"></label>

    <div class="sidebar-overlay">
        <label for="menu-toggle" class="material-icons"
            style="align-self: flex-end; cursor: pointer; font-size: 30px; margin-bottom: 40px;">close</label>

        <a href="home.html" class="nav-item main-link">
            <i class="material-icons">home</i>
            <span>Home</span>
        </a>

        <a href="train_management.html" class="nav-item">
            <i class="material-icons">train</i>
            <span>Train Management</span>
        </a>

        <a href="passenger_management.html" class="nav-item">
            <i class="material-icons">groups</i>
            <span>Passenger Management</span>
        </a>

        <a href="reservation_system.html" class="nav-item">
            <i class="material-icons">confirmation_number</i>
            <span>Reservation System</span>
        </a>

        <a href="reports.html" class="nav-item">
            <i class="material-icons">assessment</i>
            <span>Dashboard & Reports</span>
        </a>

        <a href="profile.html" class="nav-item main-link" style="margin-top: 15px;">
            <i class="material-icons">person_outline</i>
            <span>Account Details</span>
        </a>

        <a href="StartHer.html" class="logout-btn">
            <i class="material-icons">logout</i>
            <span>Logout</span>
        </a>
    </div>

    <div class="main-wrapper">
        <div class="sidebar-small">
            <label for="menu-toggle" class="material-icons menu-btn-label">menu</label>
        </div>

        <div class="content-area">
            <h1 class="page-title">Add new train</h1>

            <div class="train-form">
                <div class="form-row">
                    <label for="trainNumber">Train Number :</label>
                    <input type="number" id="trainNumber" class="input-box" placeholder="1xx">
                </div>

                <div class="form-row">
                    <label for="capacity">Capacity</label>
                    <input type="number" id="capacity" class="input-box" placeholder="50">
                </div>

                <div class="form-row">
                    <label>State:</label>
                    <div class="status-buttons">
                        <button type="button" class="status-btn available" id="availableBtn">Available</button>
                        <button type="button" class="status-btn unavailable" id="unavailableBtn">Unavailable</button>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="button" class="add-btn" id="addBtn">Add+</button>
                    <button type="button" class="cancel-btn" id="cancelBtn">Cancel</button>
                </div>

                <div class="message" id="message"></div>

                <table class="preview-table" id="previewTable">
                    <thead>
                        <tr>
                            <th>Train Number</th>
                            <th>Capacity</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="previewBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        
        if (!localStorage.getItem("userName")) {
            alert("Please login first!");
            window.location.href = "Login.html";
        }

        const trainNumberInput = document.getElementById("trainNumber");
        const capacityInput = document.getElementById("capacity");
        const availableBtn = document.getElementById("availableBtn");
        const unavailableBtn = document.getElementById("unavailableBtn");
        const addBtn = document.getElementById("addBtn");
        const cancelBtn = document.getElementById("cancelBtn");
        const message = document.getElementById("message");
        const previewTable = document.getElementById("previewTable");
        const previewBody = document.getElementById("previewBody");

        let selectedState = "";

        availableBtn.addEventListener("click", function () {
            selectedState = "Available";
            availableBtn.classList.add("active");
            unavailableBtn.classList.remove("active");
        });

        unavailableBtn.addEventListener("click", function () {
            selectedState = "Unavailable";
            unavailableBtn.classList.add("active");
            availableBtn.classList.remove("active");
        });

        addBtn.addEventListener("click", function () {
            const trainNumber = trainNumberInput.value.trim();
            const capacity = capacityInput.value.trim();

            if (trainNumber === "" || capacity === "" || selectedState === "") {
                message.textContent = "Please fill in all fields and choose the train state.";
                message.style.color = "red";
                return;
            }

            const row = document.createElement("tr");
            row.innerHTML = `
                <td>${trainNumber}</td>
                <td>${capacity}</td>
                <td>${selectedState}</td>
            `;

            previewBody.appendChild(row);
            previewTable.style.display = "table";

            message.textContent = "Train added successfully.";
            message.style.color = "green";

            trainNumberInput.value = "";
            capacityInput.value = "";
            selectedState = "";
            availableBtn.classList.remove("active");
            unavailableBtn.classList.remove("active");
        });

        cancelBtn.addEventListener("click", function () {
            trainNumberInput.value = "";
            capacityInput.value = "";
            selectedState = "";
            availableBtn.classList.remove("active");
            unavailableBtn.classList.remove("active");
            message.textContent = "";
        });
    </script>
</body>

</html>
