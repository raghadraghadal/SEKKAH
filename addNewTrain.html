<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEKKAH — Add New Train</title>
<link href="https://fonts.googleapis.com/css2?family=Abhaya+Libre:wght@500;800&family=Cairo:wght@700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
.form-card{background:white;border-radius:20px;padding:36px 40px;box-shadow:0 2px 12px rgba(0,0,0,0.06);max-width:700px;}
.form-row{display:flex;align-items:center;gap:24px;margin-bottom:28px;flex-wrap:wrap;}
.form-row label{width:150px;font-size:15px;font-weight:800;color:#333;flex-shrink:0;}
.form-input{flex:1;min-width:200px;height:48px;border:1.5px solid #e5e7eb;border-radius:12px;background:#fafafa;padding:0 18px;font-size:15px;font-weight:800;font-family:'Abhaya Libre',serif;outline:none;transition:border-color .2s;}
.form-input:focus{border-color:#12958D;background:white;}
.req-star{color:#E53935;display:none;margin-left:3px;}
.status-btns{display:flex;gap:14px;}
.status-btn{height:44px;padding:0 24px;border:2px solid transparent;border-radius:12px;font-size:14px;font-weight:800;cursor:pointer;font-family:'Abhaya Libre',serif;transition:all .2s;opacity:.7;}
.status-btn.active{opacity:1;transform:scale(1.04);}
.btn-avail{background:#d4f5e9;color:#0a6641;border-color:#d4f5e9;}
.btn-avail.active{border-color:#0a6641;}
.btn-unavail{background:#fde8e8;color:#991b1b;border-color:#fde8e8;}
.btn-unavail.active{border-color:#991b1b;}
.form-actions{display:flex;gap:14px;margin-top:32px;justify-content:flex-end;}
.msg{margin-top:16px;font-size:14px;font-weight:800;padding:10px 16px;border-radius:10px;display:none;}
.msg.success{background:#d4f5e9;color:#0a6641;display:block;}
.msg.error{background:#fde8e8;color:#991b1b;display:block;}
.preview-wrap{margin-top:24px;background:#f8fffe;border-radius:14px;overflow:hidden;display:none;}
.preview-wrap table{width:100%;border-collapse:collapse;}
.preview-wrap thead th{background:#12958D;color:white;padding:12px;font-size:13px;text-align:center;}
.preview-wrap tbody td{padding:12px;text-align:center;font-size:14px;border-bottom:1px solid #EAF6F5;}
</style>
</head>
<body>

<nav class="top-navbar">
  <a href="index.html" class="nb-brand"><div class="nb-icon">سِ</div><div class="nb-name">SEKKAH</div></a>
  <div class="nb-links">
    <a href="index.html" class="nb-link"><i class="material-icons">home</i><span>Home</span></a>
    <a href="Train management menu .html" class="nb-link active"><i class="material-icons">train</i><span>Train Management</span></a>
    <a href="Passenger Management.html" class="nb-link"><i class="material-icons">groups</i><span>Passengers</span></a>
    <a href="Reservation system .html" class="nb-link"><i class="material-icons">confirmation_number</i><span>Reservations</span></a>
    <a href="Dashboard.html" class="nb-link"><i class="material-icons">bar_chart</i><span>Dashboard</span></a>
  </div>
  <div class="nb-right">
    <a href="Profile.html" class="nb-user"><i class="material-icons">person_outline</i><span id="nbUser">Admin</span></a>
    <a href="StartHer.html" class="nb-logout"><i class="material-icons">logout</i>Logout</a>
  </div>
</nav>

<div class="page-body">
  <div class="page-title">Add New Train</div>

  <div class="form-card">
    <div class="form-row">
      <label>Train Number <span class="req-star" id="s1">*</span></label>
      <input type="number" id="trainNumber" class="form-input" placeholder="e.g. 101">
    </div>
    <div class="form-row">
      <label>Capacity <span class="req-star" id="s2">*</span></label>
      <input type="number" id="capacity" class="form-input" placeholder="e.g. 50">
    </div>
    <div class="form-row">
      <label>Status <span class="req-star" id="s3">*</span></label>
      <div class="status-btns">
        <button type="button" class="status-btn btn-avail" id="availBtn">✓ Available</button>
        <button type="button" class="status-btn btn-unavail" id="unavailBtn">✗ Unavailable</button>
      </div>
    </div>

    <div class="form-actions">
      <a href="Train management menu .html" class="btn-ghost">Cancel</a>
      <button class="btn-primary" onclick="addTrain()">
        <i class="material-icons" style="font-size:16px">add</i> Add Train
      </button>
    </div>

    <div class="msg" id="msg"></div>

    <div class="preview-wrap" id="preview">
      <table>
        <thead><tr><th>Train Number</th><th>Capacity</th><th>Status</th></tr></thead>
        <tbody id="previewBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
if(!localStorage.getItem('userName')){alert('Please login first!');location.href='Login.html';}
document.getElementById('nbUser').textContent=localStorage.getItem('userName')||'Admin';

let selectedStatus = '';

document.getElementById('availBtn').onclick = function(){
  selectedStatus='Available';
  this.classList.add('active');
  document.getElementById('unavailBtn').classList.remove('active');
};
document.getElementById('unavailBtn').onclick = function(){
  selectedStatus='Unavailable';
  this.classList.add('active');
  document.getElementById('availBtn').classList.remove('active');
};

function addTrain(){
  const num = document.getElementById('trainNumber').value.trim();
  const cap = document.getElementById('capacity').value.trim();
  const msg = document.getElementById('msg');

  document.querySelectorAll('.req-star').forEach(s=>s.style.display='none');

  if(!num){document.getElementById('s1').style.display='inline';}
  if(!cap){document.getElementById('s2').style.display='inline';}
  if(!selectedStatus){document.getElementById('s3').style.display='inline';}
  if(!num||!cap||!selectedStatus){
    msg.textContent='Please fill all fields.';
    msg.className='msg error';return;
  }
  if(+num<=0||+cap<=0){
    msg.textContent='Values must be greater than 0.';
    msg.className='msg error';return;
  }

  const trains=JSON.parse(localStorage.getItem('trains')||'[]');
  if(trains.some(t => t.number === num)){ // تتحقق اذا فيه قطار بنفس الرقم موجود مسبقا
  msg.textContent = 'Train number already exists.';//تعرض رسالة خطا للمستخدم
  msg.className = 'msg error';//تخلي شكل الرسالة error
  return; //توقف تنفيذ و ما تكمل مقارنة
}
  trains.push({number:num,capacity:cap,status:selectedStatus});
  localStorage.setItem('trains',JSON.stringify(trains));

  const row=document.createElement('tr');
  row.innerHTML=`<td>Train ${num}</td><td>${cap}</td><td>${selectedStatus}</td>`;
  document.getElementById('previewBody').appendChild(row);
  document.getElementById('preview').style.display='block';

  msg.textContent='Train added successfully!';
  msg.className='msg success';

  document.getElementById('trainNumber').value='';
  document.getElementById('capacity').value='';
  selectedStatus='';
  document.querySelectorAll('.status-btn').forEach(b=>b.classList.remove('active'));
}
</script>
</body>
</html>
