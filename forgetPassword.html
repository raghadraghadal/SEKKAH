<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Verification Page</title>
    <link href="https://fonts.googleapis.com/css2?family=Abhaya+Libre:wght@800&display=swap" rel="stylesheet">
    
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: linear-gradient(180deg, #d3e9e7, #e8f5f4); font-family: 'Abhaya Libre', serif; }
        .card { background: white; padding: 50px 40px; border-radius: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 350px; text-align: center; transition: all 0.5s ease; }
        .input-group { position: relative; margin-bottom: 25px; text-align: left; }
        input { width: 100%; padding: 18px 20px; border: 1.5px solid #e0e0e0; border-radius: 30px; box-sizing: border-box; font-size: 16px; outline: none; transition: all 0.3s ease; font-family: 'Abhaya Libre', serif; }
        input:focus { border-color: #6fbdb6; }
        label { position: absolute; top: 18px; left: 20px; color: #aaa; pointer-events: none; transition: all 0.3s ease; background: white; padding: 0 5px; font-size: 16px; font-family: 'Abhaya Libre', serif; }
        input:focus + label, input:not(:placeholder-shown) + label { top: -10px; left: 15px; font-size: 12px; color: #6fbdb6; font-weight: bold; }
        button { width: 100%; padding: 18px; background-color: #4a9d95; color: white; border: none; border-radius: 50px; font-size: 25px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: all 0.2s ease; font-family: 'Abhaya Libre', serif; letter-spacing: 1px; }
        button:active { transform: scale(0.95); }
        .step { transition: all 0.5s ease; opacity: 1; transform: translateY(0); }
        .hidden { display: none; opacity: 0; transform: translateY(20px); }
    </style>
</head>
<body>

<div class="card" id="cardContainer">
    <div id="step1" class="step">
        <div class="input-group">
            <input type="email" id="email" placeholder=" " required>
            <label for="email">Email</label>
        </div>
        <button onclick="checkEmail()">Verify</button>
    </div>

    <div id="step2" class="step hidden">
        <div class="input-group">
            <input type="password" id="pass1" placeholder=" " required>
            <label for="pass1">Password</label>
        </div>
        <div class="input-group">
            <input type="password" id="pass2" placeholder=" " required>
            <label for="pass2">Confirm Password</label>
        </div>
        <button onclick="confirmPassword()">Confirm</button>
    </div>
</div>

<script>
    // التحقق من الإيميل قبل الانتقال
    function checkEmail() {
        const email = document.getElementById('email').value.trim();
        if (email === "") {
            alert("Please enter your email address!");
        } else {
            showStep2();
        }
    }

    // دالة الانتقال للخطوة الثانية
    function showStep2() {
        const step1 = document.getElementById('step1');
        const step2 = document.getElementById('step2');
        
        step1.style.opacity = '0';
        step1.style.transform = 'translateY(-20px)';
        
        setTimeout(() => {
            step1.classList.add('hidden');
            step2.classList.remove('hidden');
            setTimeout(() => {
                step2.style.opacity = '1';
                step2.style.transform = 'translateY(0)';
            }, 50);
        }, 300);
    }

    // التحقق من تطابق كلمات المرور وإعادة التوجيه
    function confirmPassword() {
        const p1 = document.getElementById('pass1').value;
        const p2 = document.getElementById('pass2').value;

        if (p1 === "" || p2 === "") {
            alert("Please fill in both password fields!");
        } else if (p1 !== p2) {
            alert("Passwords do not match!");
        } else {
            // هنا يتم التأكد من التطابق ويتم التوجيه
            alert("Confirmed! Redirecting...");
            window.location.href = "Login.html"; 
        }
    }
</script>

</body>
</html>
