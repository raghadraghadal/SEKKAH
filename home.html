<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>home</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Abhaya+Libre:wght@800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Abhaya Libre', serif;
            font-weight: 800; 
            font-size: 14px;
        }

        body {
            margin: 0;
            display: flex;
            min-height: 100vh;
            background-color: #EAF6F5; /* نفس لون خلفية البروفايل */
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 20px;
            overflow-x: hidden;
        }

        /* التحكم في القائمة الجانبية عبر Checkbox مخفي (بدون جافا سكريبت) */
        #menu-toggle {
            display: none;
        }

        /* الشعار في الخلفية العلوية اليمنى كما في التصميم */
        .header-logo {
            position: absolute;
            top: 20px;
            right: 40px;
            width: 100px;
            z-index: 1;
        }

        .main-wrapper {
            display: flex;
            gap: 20px;
            width: 100%;
            max-width: 1200px; /* نفس حجم صفحة البروفايل */
            align-items: stretch;
        }

        /* القائمة الجانبية الصغيرة الثابتة */
        .sidebar-small {
            width: 65px;
            background: white;
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .menu-btn-label {
            font-size: 32px;
            cursor: pointer;
            color: #333;
        }

        /* القائمة الجانبية الكبيرة (Overlay) */
        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: -300px;
            width: 280px;
            height: 100%;
            background: white;
            z-index: 100;
            transition: 0.3s ease-in-out;
            box-shadow: 5px 0 15px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        #menu-toggle:checked ~ .sidebar-overlay {
            left: 0;
        }

        .overlay-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.3);
            z-index: 90;
            display: none;
        }

        #menu-toggle:checked ~ .overlay-bg {
            display: block;
        }

        .close-btn-label {
            align-self: flex-end;
            cursor: pointer;
            font-size: 30px;
            margin-bottom: 40px;
        }

        /* تنسيق روابط القائمة الجانبية */
        .nav-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            cursor: pointer;
            border-radius: 10px;
            margin-bottom: 10px;
            color: black;
            text-decoration: none;
        }

        .nav-item:hover { background: #f5f5f5; }

        /* زر تسجيل الخروج الأحمر */
        .logout-btn {
            margin-top: auto;
            background: #E53935; /* لون أحمر مطابق للتصميم */
            color: white;
            border-radius: 20px;
            padding: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            text-decoration: none;
        }

        /* المستطيل الأبيض الكبير للمحتوى */
        .content-area {
            flex: 1;
            background: white;
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 600px;
        }

        .welcome-title {
            font-size: 28px;
            margin: 40px 0 60px 0;
            text-align: center;
        }

        /* شبكة المربعات الأربعة (Grid) */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* مربعين في كل صف */
            gap: 30px;
            width: 100%;
            max-width: 800px;
        }

        /* تنسيق المربع الواحد */
        .management-card {
            background: #EAF6F5; /* لون خلفية المربعات الخفيف */
            border-radius: 25px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: black;
            transition: transform 0.2s, box-shadow 0.2s;
            text-align: center;
        }

        .management-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .card-icon-bg {
            width: 80px;
            height: 80px;
            background: #2D9596; /* لون الأيقونة الغامق كما في التصميم */
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }

        .card-icon-bg i {
            color: white;
            font-size: 40px;
        }

        .card-title {
            font-size: 16px;
        }

        /* استجابة الشاشات الصغيرة */
        @media (max-width: 768px) {
            .cards-grid { grid-template-columns: 1fr; }
            .profile-layout { gap: 40px; }
        }
    </style>
</head>
<body>

    <input type="checkbox" id="menu-toggle">

    <img src="الشعار بلا اسم.svg" alt="Sikka Logo" class="header-logo">

    <label for="menu-toggle" class="overlay-bg"></label>

    <div class="sidebar-overlay">
        <label for="menu-toggle" class="material-icons close-btn-label">close</label>
        
        <a href="home.html" class="nav-item">
            <i class="material-icons">home</i>
            <span>Home</span>
        </a>
        
        <a href="profile.html" class="nav-item">
            <i class="material-icons">person_outline</i>
            <span>Account Details</span>
        </a>

        <a href="StartHer.html" class="logout-btn">
            <i class="material-icons">logout</i>
            <span>Logout</span>
        </a>
    </div>

    <div class="main-wrapper">
        <div class="sidebar-small">
            <label for="menu-toggle" class="material-icons menu-btn-label">menu</label>
        </div>

        <div class="content-area">
            <h1 class="welcome-title">Welcome Anas! What’s on the agenda today?</h1>

            <div class="cards-grid">
                
                <a href="train_management.html" class="management-card">
                    <div class="card-icon-bg">
                        <i class="material-icons">train</i>
                    </div>
                    <span class="card-title">Train Management</span>
                </a>

                <a href="passenger_management.html" class="management-card">
                    <div class="card-icon-bg">
                        <i class="material-icons">people</i>
                    </div>
                    <span class="card-title">Passenger Management</span>
                </a>

                <a href="reservation_system.html" class="management-card">
                    <div class="card-icon-bg">
                        <i class="material-icons">confirmation_number</i>
                    </div>
                    <span class="card-title">Reservation System</span>
                </a>

                <a href="reports.html" class="management-card">
                    <div class="card-icon-bg">
                        <i class="material-icons">assessment</i>
                    </div>
                    <span class="card-title">Dashboard & Reports</span>
                </a>

            </div>
        </div>
    </div>

</body>
</html>
