<body>

<h1>Create New Table</h1>

<table>
    <tr>
        <th>Organization</th>
        <th>Train</th>
        <th>From</th>
        <th>To</th>
        <th>Arrival Time</th>
        <th>Departure Time</th>
        <th>Notes</th>
    </tr>

    <!-- 5 Rows -->
    <tr><td><input id="org1"></td><td><input id="train1"></td><td><input id="from1"></td><td><input id="to1"></td><td><input id="arrive1"></td><td><input id="depart1"></td><td><input id="notes1"></td></tr>
    <tr><td><input id="org2"></td><td><input id="train2"></td><td><input id="from2"></td><td><input id="to2"></td><td><input id="arrive2"></td><td><input id="depart2"></td><td><input id="notes2"></td></tr>
    <tr><td><input id="org3"></td><td><input id="train3"></td><td><input id="from3"></td><td><input id="to3"></td><td><input id="arrive3"></td><td><input id="depart3"></td><td><input id="notes3"></td></tr>
    <tr><td><input id="org4"></td><td><input id="train4"></td><td><input id="from4"></td><td><input id="to4"></td><td><input id="arrive4"></td><td><input id="depart4"></td><td><input id="notes4"></td></tr>
    <tr><td><input id="org5"></td><td><input id="train5"></td><td><input id="from5"></td><td><input id="to5"></td><td><input id="arrive5"></td><td><input id="depart5"></td><td><input id="notes5"></td></tr>
</table>
   




<button class="save-btn" onclick="saveNewTable()">Save</button>





<script>

 function collectData() {
    return [
        { org: org1.value, train: train1.value, from: from1.value, to: to1.value, arrive: arrive1.value, depart: depart1.value, notes: notes1.value },
        { org: org2.value, train: train2.value, from: from2.value, to: to2.value, arrive: arrive2.value, depart: depart2.value, notes: notes2.value },
        { org: org3.value, train: train3.value, from: from3.value, to: to3.value, arrive: arrive3.value, depart: depart3.value, notes: notes3.value },
        { org: org4.value, train: train4.value, from: from4.value, to: to4.value, arrive: arrive4.value, depart: depart4.value, notes: notes4.value },
        { org: org5.value, train: train5.value, from: from5.value, to: to5.value, arrive: arrive5.value, depart: depart5.value, notes: notes5.value }
    ];
}













function saveNewTable() {
        alert("Saved Successfully");   // رسالة الحفظ

    // 1. نجمع البيانات من الجدول
    const data = collectData();

    // 2. نجيب قائمة الجداول القديمة
    let list = JSON.parse(localStorage.getItem("scheduleList")) || [];

    // 3. نحدد رقم الجدول الجديد
    let newIndex = list.length + 1;
    let tableName = "schedule_" + newIndex;

    // 4. نحفظ الجدول باسم جديد
    localStorage.setItem(tableName, JSON.stringify(data));

    // 5. نضيف الاسم للقائمة
    list.push(tableName);
    localStorage.setItem("scheduleList", JSON.stringify(list));

    // 6. رسالة نجاح
    alert("Saved Successfully");

    // 7. نرجع للصفحة
    window.location.href = "create-schedule.html";
        window.location.href = "create-schedule.html";

}


    // يرجع مباشرة لصفحة create-schedule

</script>
