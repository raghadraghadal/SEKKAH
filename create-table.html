<script>


 function collectData() {
    return [
        { org: org1.value, train: train1.value, from: from1.value, to: to1.value, arrive: arrive1.value, depart: depart1.value, notes: notes1.value },
        { org: org2.value, train: train2.value, from: from2.value, to: to2.value, arrive: arrive2.value, depart: depart2.value, notes: notes2.value },
        { org: org3.value, train: train3.value, from: from3.value, to: to3.value, arrive: arrive3.value, depart: depart3.value, notes: notes3.value },
        { org: org4.value, train: train4.value, from: from4.value, to: to4.value, arrive: arrive4.value, depart: depart4.value, notes: notes4.value },
        { org: org5.value, train: train5.value, from: from5.value, to: to5.value, arrive: arrive5.value, depart: depart5.value, notes: notes5.value }
    ];
}








function saveTable() {

    const rows = [];

    for (let i = 1; i <= 5; i++) {
        rows.push({
            org: document.getElementById('org' + i).value,
            train: document.getElementById('train' + i).value,
            from: document.getElementById('from' + i).value,
            to: document.getElementById('to' + i).value,
            arrive: document.getElementById('arrive' + i).value,
            depart: document.getElementById('depart' + i).value,
            notes: document.getElementById('notes' + i).value
        });
    }}

    localStorage.setItem("trainTable", JSON.stringify(rows));
    alert("Table Saved Successfully");

    // يرجع مباشرة لصفحة create-schedule
    window.location.href = "create-schedule.html";


function goToSchedule() {
    window.location.href = "create-schedule.html";
}


function collectData() {
    return [
        {
            org: document.getElementById("org1").value,
            train: document.getElementById("train1").value,
            from: document.getElementById("from1").value,
            to: document.getElementById("to1").value,
            arrive: document.getElementById("arrive1").value,
            depart: document.getElementById("depart1").value,
            notes: document.getElementById("notes1").value
        },
        {
            org: document.getElementById("org2").value,
            train: document.getElementById("train2").value,
            from: document.getElementById("from2").value,
            to: document.getElementById("to2").value,
            arrive: document.getElementById("arrive2").value,
            depart: document.getElementById("depart2").value,
            notes: document.getElementById("notes2").value
        },
        {
            org: document.getElementById("org3").value,
            train: document.getElementById("train3").value,
            from: document.getElementById("from3").value,
            to: document.getElementById("to3").value,
            arrive: document.getElementById("arrive3").value,
            depart: document.getElementById("depart3").value,
            notes: document.getElementById("notes3").value
        },
        {
            org: document.getElementById("org4").value,
            train: document.getElementById("train4").value,
            from: document.getElementById("from4").value,
            to: document.getElementById("to4").value,
            arrive: document.getElementById("arrive4").value,
            depart: document.getElementById("depart4").value,
            notes: document.getElementById("notes4").value
        },
        {
            org: document.getElementById("org5").value,
            train: document.getElementById("train5").value,
            from: document.getElementById("from5").value,
            to: document.getElementById("to5").value,
            arrive: document.getElementById("arrive5").value,
            depart: document.getElementById("depart5").value,
            notes: document.getElementById("notes5").value
        }
    ];
}


function createTable() {
    const data = collectData();
    localStorage.setItem("currentTable", JSON.stringify(data));
    alert("Table Created (Not Saved Yet)");
}


function saveNewTable() {

    // 1. نجيب الجدول اللي تم إنشاؤه
    const data = JSON.parse(localStorage.getItem("currentTable"));

    if (!data) {
        alert("Please press Create first");
        return;
    }

    // 2. نجيب قائمة الجداول القديمة
    let list = JSON.parse(localStorage.getItem("scheduleList")) || [];

    // 3. نحدد رقم الجدول الجديد
    let newIndex = list.length + 1;
    let tableName = "schedule_" + newIndex;

    // 4. نحفظ الجدول باسم جديد
    localStorage.setItem(tableName, JSON.stringify(data));

    // 5. نضيف الاسم للقائمة
    list.push(tableName);
    localStorage.setItem("scheduleList", JSON.stringify(list));

    // 6. رسالة نجاح
    alert("Saved Successfully");

    // 7. نرجع للصفحة
    window.location.href = "create-schedule.html";
}

</script>
