<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEKKAH — Sign In</title>
    <!-- روابط الخطوط والأيقونات -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&family=Playfair+Display:wght@900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <style>
        /* --- تنسيقات عامة للموقع --- */
        *{box-sizing:border-box; margin:0; padding:0;}
        
        body{
            font-family:'Cairo',sans-serif;
            min-height:100vh;
            background:#f0f9f8; 
            display:flex;
            overflow:hidden;
        }

        /* --- الجانب الأيسر المطور (مطابق لصفحة إنشاء الحساب) --- */
        .left{
            width:38%; /* تم تعديل العرض ليناسب التصميم الجديد */
            /* التدرج اللوني الداكن والفخم */
            background:linear-gradient(145deg,#0d1f1e,#12312e,#0a6b65);
            position:relative;
            overflow:hidden;
            display:flex;
            flex-direction:column;
            justify-content:space-between; /* توزيع المحتوى من الأعلى للأسفل */
            padding:52px 48px;
        }

        /* الكرات المضيئة في الخلفية */
        .orb1{position:absolute; top:-60px; right:-60px; width:250px; height:250px; border-radius:50%; background:rgba(18,149,141,.12);}
        .orb2{position:absolute; bottom:-40px; left:-40px; width:200px; height:200px; border-radius:50%; background:rgba(45,212,191,.06);}

        /* خطوط مسار القطار المتحركة (الأنيميشن) */
        .tracks{position:absolute; inset:0; overflow:hidden; opacity:.1;}
        .track{
            position:absolute; 
            height:1.5px; 
            background:#2DD4BF; 
            animation:sl 5s linear infinite;
        }
        .track:nth-child(1){top:30%; width:50%; animation-delay:0s;}
        .track:nth-child(2){top:55%; width:35%; animation-delay:2s;}
        .track:nth-child(3){top:75%; width:55%; animation-delay:1s;}

        /* حركة الخطوط من اليسار لليمين */
        @keyframes sl{0%{left:-65%} 100%{left:110%}}

        /* --- قسم الشعار المطور (Logo) --- */
        .brand{display:flex; align-items:center; gap:12px; position:relative; z-index:2;}
        .brand-box{
            width:42px; height:42px;
            border-radius:11px;
            /* تدرج لوني للشعار مطابق لصفحة التسجيل */
            background:linear-gradient(135deg,#12958D,#2DD4BF);
            display:flex; align-items:center; justify-content:center;
            font-size:17px; font-weight:900; color:white;
        }
        .brand-name{
            font-size:20px;
            font-weight:900; color:white; letter-spacing:2.5px;
        }

        /* --- نصوص الترحيب في الجانب الأيسر --- */
        .left-body{position:relative; z-index:2;}
        .left-body h1{
            font-family:'Playfair Display',serif;
            font-size:46px; /* حجم متناسق مع التصميم الجديد */
            font-weight:900; color:white; line-height:1.1; margin-bottom:14px;
        }
        .left-body h1 span{
            color:#2DD4BF; /* تلوين الكلمة المفتاحية */
        }
        .left-body p{
            color:rgba(255,255,255,.5);
            font-size:13px; line-height:1.8;
        }

        /* --- الجانب الأيمن (منطقة الدخول) --- */
        .right{width:62%; display:flex; align-items:center; justify-content:center; padding:48px;}
        
        .card{
            width:100%; max-width:420px;
            animation:fadeUp .5s ease both;
        }
        @keyframes fadeUp{from{opacity:0; transform:translateY(18px)} to{opacity:1; transform:translateY(0)}}

        .card-title{
            font-family:'Playfair Display',serif;
            font-size:32px;
            font-weight:900; color:#0d1f1e; margin-bottom:6px;
        }
        .card-sub{font-size:13px; color:#7a9896; margin-bottom:36px;}

        /* صندوق رسائل الخطأ */
        .err-box{
            background:#fde8e8; color:#8b1a1a; border-radius:10px;
            padding:11px 15px; font-size:13px; margin-bottom:16px;
            display:none; border-left:3px solid #e53935;
        }

        /* تنسيق الحقول */
        .field{margin-bottom:20px;}
        .field label{
            display:block; font-size:11px; font-weight:700; 
            color:#7a9896; text-transform:uppercase; letter-spacing:1.2px; margin-bottom:8px;
        }
        .field input{
            width:100%; padding:14px 18px;
            border:1.5px solid #d0e8e6;
            border-radius:14px; font-size:14px; font-family:'Cairo',sans-serif;
            background:white; color:#0d1f1e; outline:none; transition:border-color .2s,box-shadow .2s;
        }
        .field input:focus{
            border-color:#12958D; 
            box-shadow:0 0 0 4px rgba(18,149,141,.12);
        }
        
        .pw-wrap{position:relative;}
        .pw-wrap input{padding-right:46px;}
        .eye{
            position:absolute; right:14px; top:50%; 
            transform:translateY(-50%); color:#bbb; cursor:pointer; font-size:18px;
        }

        /* زر الدخول */
        .btn{
            width:100%; padding:15px;
            background:linear-gradient(135deg,#12958D,#0d7069);
            border:none; border-radius:14px; color:white;
            font-size:15px; font-weight:700; font-family:'Cairo',sans-serif;
            cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px;
            transition:transform .15s, box-shadow .2s;
            box-shadow:0 6px 24px rgba(18,149,141,.3);
        }
        .btn:hover{transform:translateY(-2px); box-shadow:0 10px 32px rgba(18,149,141,.45);}
        
        .link{color:#12958D; text-decoration:none; font-weight:700;}
        .bottom{text-align:center; margin-top:24px; font-size:13px; color:#7a9896;}

        /* استجابة الشاشات */
        @media(max-width:900px){
            body{flex-direction:column; overflow:auto;}
            .left, .right{width:100%;}
            .left{padding:40px 28px;}
            .right{padding:36px 24px;}
        }
    </style>
</head>
<body>

<div class="left">
    <!-- إضافة الدوائر المضيئة والخطوط المتحركة -->
    <div class="orb1"></div><div class="orb2"></div>
    <div class="tracks"><div class="track"></div><div class="track"></div><div class="track"></div></div>

    <!-- الشعار المطور -->
    <div class="brand">
        <div class="brand-box">سِ</div>
        <div class="brand-name">SEKKAH</div>
    </div>

    <!-- نص الترحيب المطور -->
    <div class="left-body">
        <h1>Welcome Back,<br><span>Admin.</span></h1>
        <p>Your operations dashboard is ready. Sign in to manage Saudi Arabia's rail network.</p>
    </div>

    <!-- مساحة فارغة في الأسفل للحفاظ على التوازن -->
    <div style="height: 20px;"></div>
</div>

<div class="right">
    <div class="card">
        <div class="card-title">Sign In</div>
        <div class="card-sub">Access your operations account</div>

        <div class="err-box" id="errMsg"></div>

        <div class="field">
            <label>Username</label>
            <input type="text" id="username" placeholder="Enter your username" autocomplete="off">
        </div>
        <div class="field">
            <label>Password</label>
            <div class="pw-wrap">
                <input type="password" id="password" placeholder="••••••••">
                <i class="material-icons eye" onclick="togglePw()">visibility_off</i>
            </div>
        </div>

        <button class="btn" onclick="doLogin()">
            <i class="material-icons">login</i> Sign In
        </button>

        <div class="bottom">
            Don't have an account? <a href="SingUp.html" class="link">Create one</a> | <a href="ForgetPassword.html" class="link">Forgot password?</a>
        </div>
    </div>
</div>

<script>
    function togglePw(){
        const p = document.getElementById('password');
        const i = event.target;
        p.type = p.type === 'password' ? 'text' : 'password';
        i.textContent = p.type === 'password' ? 'visibility_off' : 'visibility';
    }

    function doLogin(){
        const u = document.getElementById('username').value.trim();
        const p = document.getElementById('password').value;
        const e = document.getElementById('errMsg');

        const storedUser = localStorage.getItem('userUsername');
        const storedPass = localStorage.getItem('userPassword');

        const fixedUsers = [
            {user: "Anas", pass: "Anas123"},
            {user: "Saad", pass: "Saad123"},
            {user: "Rawan", pass: "Rawan123"}
        ];

        if(!u || !p){
            e.style.display='block'; 
            e.textContent='Please fill in all fields.'; 
            return;
        }

        const isFixedUser = fixedUsers.find(account => account.user === u && account.pass === p);

        if(isFixedUser || (u === storedUser && p === storedPass && u !== "")){
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('currentActiveUser', u);
            
            alert("Welcome back, " + u + "!");
            location.href = 'index.html'; 
            
        } else {
            e.style.display='block'; 
            e.textContent='Invalid username or password.';
            document.getElementById('password').value = '';
        }
    }

    document.addEventListener('keydown', e => { 
        if(e.key === 'Enter') doLogin(); 
    });
</script>
</body>
</html>
