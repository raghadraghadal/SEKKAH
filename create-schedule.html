<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Saved Train Schedule</title>

    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Abhaya+Libre:wght@800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">

    <style>
        * {
            box-sizing: border-box;
            font-family: 'Abhaya Libre', serif;
            font-weight: 800;
            font-size: 14px;
        }

        body {
            margin: 0;
            display: flex;
            min-height: 100vh;
            background-color: #EAF6F5;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 20px;
            overflow-x: hidden;
        }

        #menu-toggle { display: none; }

        .header-logo {
            position: absolute;
            top: 20px;
            right: 40px;
            width: 100px;
            z-index: 1;
        }

        .main-wrapper {
            display: flex;
            gap: 20px;
            width: 100%;
            max-width: 1200px;
            align-items: stretch;
        }

        .sidebar-small {
            width: 65px;
            background: white;
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .menu-btn-label {
            font-size: 32px;
            cursor: pointer;
            color: #333;
        }

        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: -300px;
            width: 280px;
            height: 100%;
            background: white;
            z-index: 100;
            transition: 0.3s ease-in-out;
            box-shadow: 5px 0 15px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        #menu-toggle:checked ~ .sidebar-overlay { left: 0; }

        .overlay-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.3);
            z-index: 90;
            display: none;
        }

        #menu-toggle:checked ~ .overlay-bg { display: block; }

        .close-btn-label {
            align-self: flex-end;
            cursor: pointer;
            font-size: 30px;
            margin-bottom: 40px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            cursor: pointer;
            border-radius: 10px;
            margin-bottom: 10px;
            color: black;
            text-decoration: none;
        }

        .nav-item:hover { background: #f5f5f5; }

        .logout-btn {
            margin-top: auto;
            background: #E53935;
            color: white;
            border-radius: 20px;
            padding: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            text-decoration: none;
        }

        .content-area {
            flex: 1;
            background: white;
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 600px;
        }

        /* رفع العنوان وتكبيره */
        h1 {
            font-size: 34px;
            margin-top: 5px;
            margin-bottom: 25px;
        }

        /* شبكة مربعين فقط */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            width: 100%;
            max-width: 700px;
            margin-top: 40px; /* نزلنا المربعات */
            margin-bottom: 40px;
        }

        .management-card {
            background: #EAF6F5;
            border-radius: 25px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: black;
            transition: transform 0.2s, box-shadow 0.2s;
            text-align: center;
        }

        .management-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .card-icon-bg {
            width: 80px;
            height: 80px;
            background: #2D9596;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }

        .card-icon-bg i {
            color: white;
            font-size: 40px;
        }

        .card-title {
            font-size: 16px;
        }

        /* جدول البيانات */
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 15px;
            overflow: hidden;
            margin-top: 20px;
            display: none;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: center;
        }

        th {
            background: #2B8F8A;
            color: white;
        }
        .btn {
            margin-top: 20px;
            display: block;
            width: 200px;
            padding: 12px;
            background: #2B8F8A;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            margin-left: auto;
            margin-right: auto;
        }

    </style>
</head>

<body>

<input type="checkbox" id="menu-toggle">

<img src="Logo.svg" class="header-logo">

<label for="menu-toggle" class="overlay-bg"></label>

<div class="sidebar-overlay">
    <label for="menu-toggle" class="material-icons close-btn-label">close</label>

    <a href="home.html" class="nav-item">
        <i class="material-icons">home</i>
        <span>Home</span>
    </a>

    <a href="profile.html" class="nav-item">
        <i class="material-icons">person_outline</i>
        <span>Account Details</span>
    </a>

    <a href="StartHer.html" class="logout-btn">
        <i class="material-icons">logout</i>
        <span>Logout</span>
    </a>
</div>

<div class="main-wrapper">
    <div class="sidebar-small">
        <label for="menu-toggle" class="material-icons menu-btn-label">menu</label>
    </div>

    <div class="content-area">
        <h1>Saved Train Schedule</h1>

        <!-- المربعات -->
        <div class="cards-grid">

            <!-- Create Table -->
            <a href="create-table.html" class="management-card">
                <div class="card-icon-bg">
                    <i class="material-icons">add_box</i>
                </div>
                <span class="card-title">Create Table</span>
            </a>

            <!-- Show Saved Table -->
            <a href="#savedTable" onclick="showSavedTable()" class="management-card">
                <div class="card-icon-bg">
                    <i class="material-icons">table_view</i>
                </div>
                <span class="card-title">Show Saved Table</span>
            </a>

        </div>

<div class="top-buttons">
    <a class="btn" href="ViewTimetable.html">View Timetable</a>
</div>
        <!-- جدول البيانات -->
        <table id="savedTable">
            <tr>
                <th>Organization</th>
                <th>Train</th>
                <th>From</th>
                <th>To</th>
                <th>Arrival Time</th>
                <th>Departure Time</th>
                <th>Notes</th>
            </tr>
        </table>

    </div>
</div>

<script>
function showSavedTable() {
    const table = document.getElementById("savedTable");
    table.style.display = "table";

    const saved = JSON.parse(localStorage.getItem("trainTable"));

    if (!saved) {
        alert("No saved data found");
        return;
    }

    table.innerHTML = `
        <tr>
            <th>Organization</th>
            <th>Train</th>
            <th>From</th>
            <th>To</th>
            <th>Arrival Time</th>
            <th>Departure Time</th>
            <th>Notes</th>
        </tr>
    `;

    saved.forEach(row => {
        const tr = document.createElement("tr");

        tr.innerHTML = `
            <td>${row.org}</td>
            <td>${row.train}</td>
            <td>${row.from}</td>
            <td>${row.to}</td>
            <td>${row.arrive}</td>
            <td>${row.depart}</td>
            <td>${row.notes}</td>
        `;

        table.appendChild(tr);
    });
}
</script>

</body>
</html>
